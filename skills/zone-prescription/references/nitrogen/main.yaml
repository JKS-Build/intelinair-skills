name: nitrogen-prescription
description: >
  Variable-rate nitrogen prescription. Correlates application history with
  yield response by soil productivity tier and drainage class. Adds
  rec_nitrogen_lbs column to workspace table.
version: 1

steps:
  - step: 1
    id: nitrogen_compute
    tool: analyze

    timeout_ms: 60000
    output: agent
    arguments:
      table: temp_rx_zones

      code: |
        # df is auto-loaded from temp_rx_zones (via table argument)
        zones = df.copy()
        zones = zones.reset_index(drop=True)
        import numpy as np

        is_corn = '{{ crop_type }}' == 'corn'

        # Vectorized N rate computation
        sp = zones['soil_productivity'].fillna(0.7).astype(float)
        yld = zones['harvest_yield'].fillna(0).astype(float)
        dc = zones['drainage_class'].fillna('Unknown').astype(str)
        applied = zones['as_applied_rate'].fillna(0).astype(float)

        if is_corn:
            N_MIN, N_MAX = 100, 250
            # Yield-based: MRTN ~1.1 lb N per bushel
            base_n = np.where(yld > 0, yld * 1.1,
                     np.where(sp > 0.82, 200, np.where(sp > 0.72, 185, np.where(sp > 0.62, 165, 145))))
            # Drainage adjustment: poorly drained +10%, well drained -5%
            drain_mult = np.where(dc.str.contains('poorly', case=False, na=False), 1.10,
                         np.where(dc.str.contains('Well drained', case=False, na=False) & ~dc.str.contains('Moderate', case=False, na=False), 0.95, 1.0))
            # OM/soil productivity adjustment: high prod soils have more natural N
            om_mult = np.where(sp > 0.85, 0.90, 1.0)
            zones['rec_nitrogen_lbs'] = (base_n * drain_mult * om_mult).clip(N_MIN, N_MAX).round().astype(int)
        else:
            # Soybeans: minimal N (starter only)
            zones['rec_nitrogen_lbs'] = np.where(sp > 0.72, 20, 15).astype(int)

        zones['current_nitrogen_lbs'] = applied.where(applied > 0, zones['rec_nitrogen_lbs'].median())
        zones['nitrogen_change'] = zones['rec_nitrogen_lbs'] - zones['current_nitrogen_lbs']

        # Save ONLY the prescription column as a small separate table
        rx_nitrogen = zones[['zone_id', 'rec_nitrogen_lbs', 'current_nitrogen_lbs', 'nitrogen_change']].copy()
        create_temp_table(rx_nitrogen, 'temp_rx_nitrogen')

        # Summary
        has_data = (applied > 0).sum()
        total = len(zones)
        crop_label = 'Corn' if is_corn else 'Soybean'
        print(f"=== Nitrogen Prescription: {crop_label} {{ year }} ===")
        print(f"Zones: {total:,} | With N data: {int(has_data)} | Fields: {zones['field_name'].nunique()}")
        print(f"Recommended N range: {int(zones['rec_nitrogen_lbs'].min())} — {int(zones['rec_nitrogen_lbs'].max())} lbs/ac")
        if has_data > 0:
            changed = int((zones['nitrogen_change'].abs() > 10).sum())
            print(f"Zones with N adjustment >10 lbs: {changed}")
        else:
            print(f"No application history — using MRTN-based defaults (~1.1 lb N/bu)")
        print(f"N rate: MRTN approximation (~1.1 lb N/bu yield goal)")
        print(f"Drainage: poorly drained +10%, well drained -5%")
        print(f"High-OM soils (prod >0.85): -10% (natural N supply)")
