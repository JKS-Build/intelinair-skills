name: fertilizer-prescription
description: >
  Variable-rate fertilizer (P/K) prescription based on yield removal
  and soil productivity. Adds rec_fertilizer_lbs column to workspace
  table temp_rx_zones.
version: 2

steps:
  - step: 1
    id: fertilizer_compute
    tool: analyze

    timeout_ms: 60000
    output: agent
    arguments:
      table: temp_rx_zones

      code: |
        # df is auto-loaded from temp_rx_zones (via table argument)
        zones = df.copy()
        zones = zones.reset_index(drop=True)
        import numpy as np

        is_corn = '{{ crop_type }}' == 'corn'

        # Nutrient removal rates (per bushel harvested)
        if is_corn:
            P_REMOVAL = 0.37   # lbs P2O5 per bu corn
            K_REMOVAL = 0.27   # lbs K2O per bu corn
            FERT_MIN, FERT_MAX = 30, 200
        else:
            P_REMOVAL = 0.80   # lbs P2O5 per bu soybean
            K_REMOVAL = 1.15   # lbs K2O per bu soybean (NOT 1.40)
            FERT_MIN, FERT_MAX = 40, 250

        sp = zones['soil_productivity'].fillna(0.7).astype(float)
        yld = zones['harvest_yield'].fillna(0).astype(float)
        dc = zones['drainage_class'].fillna('Unknown').astype(str)
        applied = zones['as_applied_rate'].fillna(0).astype(float)

        # Vectorized tier multiplier: lower productivity may need build-up
        tier_mult = np.where(sp > 0.82, 1.0, np.where(sp > 0.72, 1.05, np.where(sp > 0.62, 1.15, 1.25)))

        # Drainage K modifier: poorly drained +15% (roots can't access K in saturated soil)
        k_drain = np.where(dc.str.contains('poorly', case=False, na=False), 1.15,
                  np.where(dc.str.contains('Well drained', case=False, na=False) & ~dc.str.contains('Moderate', case=False, na=False), 0.95, 1.0))

        # Maintenance rate: replace what crop removes
        p_rate = yld * P_REMOVAL
        k_rate = yld * K_REMOVAL * k_drain

        # Combined P+K with tier adjustment
        has_yield = yld > 0
        # Tier-based defaults when no yield data
        defaults = np.where(sp > 0.82, 80 if is_corn else 100,
                   np.where(sp > 0.72, 90 if is_corn else 110,
                   np.where(sp > 0.62, 100 if is_corn else 120, 110 if is_corn else 130)))

        combined = np.where(has_yield, ((p_rate + k_rate) * tier_mult), defaults.astype(float))
        zones['rec_fertilizer_lbs'] = combined.clip(FERT_MIN, FERT_MAX).round().astype(int)

        zones['current_fertilizer_lbs'] = applied.where(applied > 0, zones['rec_fertilizer_lbs'].median())
        zones['fertilizer_change'] = zones['rec_fertilizer_lbs'] - zones['current_fertilizer_lbs']

        # Save ONLY the prescription column as a small separate table
        rx_fert = zones[['zone_id', 'rec_fertilizer_lbs', 'current_fertilizer_lbs', 'fertilizer_change']].copy()
        create_temp_table(rx_fert, 'temp_rx_fertilizer')

        # Summary
        has_data = (applied > 0).sum()
        total = len(zones)
        crop_label = 'Corn' if is_corn else 'Soybean'
        print(f"=== Fertilizer Prescription: {crop_label} {{ year }} ===")
        print(f"Zones: {total:,} | With fert data: {int(has_data)} | Fields: {zones['field_name'].nunique()}")
        print(f"Recommended rate range: {int(zones['rec_fertilizer_lbs'].min())} — {int(zones['rec_fertilizer_lbs'].max())} lbs/ac")
        print(f"P2O5 removal: {P_REMOVAL} lb/bu | K2O removal: {K_REMOVAL} lb/bu")
        print(f"Soybeans remove ~4.3x more K per bushel than corn — K is the ceiling constraint.")
        print(f"Drainage K modifier: poorly drained +15%")
        if has_data > 0:
            changed = int((zones['fertilizer_change'].abs() > 15).sum())
            print(f"Zones with adjustment >15 lbs: {changed}")
        else:
            print(f"No application history — using yield-removal defaults")
