name: zone-prescription
description: >
  Variable-rate prescription generator with zone map visualization.
  Supports seed, nitrogen, and fertilizer prescriptions individually or
  combined. Each prescription type adds a layer to the zone map and a
  section to the downloadable ISOXML file. Users can fork this skill
  and customize the rate logic for their operation.
version: 1
tags: [prescription, zone-map, variable-rate, seed, nitrogen, fertilizer, isoxml]
scope: global
author: system

parameters:
  year:
    type: integer
    description: Crop year
    required: true
    default: 2024
  crop_type:
    type: string
    description: "'corn' or 'soybeans'"
    required: true
    default: corn
  company_id:
    type: string
    description: Company ID filter (REQUIRED for performance)
    required: true
  prescription_types:
    type: string
    description: >
      Comma-separated list of prescription types to generate.
      Options: seed, nitrogen, fertilizer. Example: "seed,nitrogen"
    required: true
    default: "seed"
  field_name:
    type: string
    description: Optional field name filter (omit for all fields)
    required: false

steps:
  # Step 1: Query zone geometry + field properties (shared base for all prescriptions)
  - step: 1
    id: base_query
    tool: query
    output_table: temp_rx_zones
    timeout_ms: 30000
    output: workspace
    arguments:
      sql: |
        SELECT
          CAST(fp.zone_id AS VARCHAR) as zone_id,
          CAST(fp.field_id AS VARCHAR) as field_id,
          CAST(fp.company_id AS VARCHAR) as company_id,
          fp.field_name, fp.field_token,
          fp.centroid_lat, fp.centroid_lon, fp.acres,
          fp.soil_type, fp.soil_productivity, fp.drainage_class,
          fp.water_holding_capacity, fp.elevation, fp.slope,
          fp.harvest_yield, fp.crop_type,
          ST_AsText(fp.zone_geometry) as geometry_wkt,
          p.hybrid, p.brand, p.planting_population, p.seeding_rate,
          a.as_applied_rate
        FROM field_properties fp
        LEFT JOIN planting_events p
          ON fp.field_id = p.field_id AND fp.zone_id = p.zone_id AND fp.year = p.year
        LEFT JOIN (
          SELECT field_id, zone_id, year,
            MAX(as_applied_rate) as as_applied_rate
          FROM application_events
          WHERE as_applied_rate > 0
          GROUP BY field_id, zone_id, year
        ) a ON fp.field_id = a.field_id AND fp.zone_id = a.zone_id AND fp.year = a.year
        WHERE fp.year = {{ year }}
          AND CAST(fp.company_id AS VARCHAR) = '{{ company_id }}'
          AND fp.crop_type = '{{ crop_type }}'
          AND fp.zone_geometry IS NOT NULL
      table_name: temp_rx_zones

  # Step 2: Summarize results after all reference plans have run
  # The agent renders the zone map after skill execution via
  # write(type:"artifact", component:"zone-map", data:temp_rx_zones)
  - step: 2
    id: summary
    tool: analyze
    input_tables: [temp_rx_zones]
    timeout_ms: 30000
    output: agent
    arguments:
      table: temp_rx_zones
      code: |
        # df is auto-loaded from temp_rx_zones
        zones = df.copy()
        # Join any prescription tables that were created by reference plans
        for rx_table in ['temp_rx_seed', 'temp_rx_nitrogen', 'temp_rx_fertilizer']:
            try:
                rx = sql_df(f'SELECT * FROM "{rx_table}"')
                zones = zones.merge(rx, on='zone_id', how='left')
            except:
                pass  # This prescription type wasn't requested
        rx_cols = [c for c in zones.columns if c.startswith('rec_')]
        crop_label = 'Corn' if '{{ crop_type }}' == 'corn' else 'Soybean'
        print(f"=== Prescription Summary: {crop_label} {{ year }} ===")
        print(f"Zones: {len(zones):,} | Fields: {zones['field_name'].nunique()} | Acres: {zones['acres'].sum():,.0f}")
        if rx_cols:
            print(f"Prescription layers: {', '.join(rx_cols)}")
            for col in rx_cols:
                vals = zones[col].dropna()
                if len(vals) > 0:
                    print(f"  {col}: {vals.min():.0f} — {vals.max():.0f} (avg {vals.mean():.0f})")
        else:
            print("No prescription layers generated — check prescription_types parameter")
        print(f"Use the zone map (write artifact) to visualize layers interactively.")

hooks:
  # Chain reference plans based on prescription_types parameter
  - after: base_query
    condition: "{{ prescription_types }} contains \"seed\""
    execute: references/seed
    parameters:
      year: "{{ year }}"
      crop_type: "{{ crop_type }}"
      company_id: "{{ company_id }}"

  - after: base_query
    condition: "{{ prescription_types }} contains \"nitrogen\""
    execute: references/nitrogen
    parameters:
      year: "{{ year }}"
      crop_type: "{{ crop_type }}"
      company_id: "{{ company_id }}"

  - after: base_query
    condition: "{{ prescription_types }} contains \"fertilizer\""
    execute: references/fertilizer
    parameters:
      year: "{{ year }}"
      crop_type: "{{ crop_type }}"
      company_id: "{{ company_id }}"
