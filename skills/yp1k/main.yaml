name: yp1k-seeding-analysis
description: >
  Yield Per 1,000 (YP1K) seeding rate optimization diagnostic.
  Two-stage: check emergence quality, then compute YP1K with recommendations.
version: 6

parameters:
  year:
    type: integer
    required: true
  crop_type:
    type: string
    required: true
  company_id:
    type: string
    required: true

steps:
  - step: 1
    tool: query
    output_table: temp_yp1k_base
    timeout_ms: 30000
    expected_parameters: [year, crop_type, company_id]
    output: workspace
    arguments:
      sql: |
        SELECT
          CAST(p.field_id AS VARCHAR) as field_id,
          CAST(p.zone_id AS VARCHAR) as zone_id,
          p.year, p.hybrid, p.brand, p.planting_population, p.seeding_rate,
          p.crop_type, p.field_name, p.field_token,
          CAST(p.company_id AS VARCHAR) as company_id, p.company_name,
          p.harvest_yield, p.harvest_moisture_pct, p.relative_maturity,
          fp.drainage_class, fp.soil_type, fp.soil_productivity,
          fp.acres, fp.county, fp.state,
          fp.centroid_lat as latitude, fp.centroid_lon as longitude,
          img.percent_emerged
        FROM planting_events p
        JOIN field_properties fp
          ON p.field_id = fp.field_id AND p.zone_id = fp.zone_id AND p.year = fp.year
        LEFT JOIN (
          SELECT field_id, zone_id, year, MAX(percent_emerged) as percent_emerged
          FROM imagery_events
          WHERE percent_emerged IS NOT NULL
          GROUP BY field_id, zone_id, year
        ) img ON p.field_id = img.field_id AND p.zone_id = img.zone_id AND p.year = img.year
        WHERE p.year = {{ year }}
          AND p.harvest_yield > 0
          AND p.planting_population > 0
          AND CAST(p.company_id AS VARCHAR) = '{{ company_id }}'
          AND p.crop_type = '{{ crop_type }}'
          AND (
            ('{{ crop_type }}' = 'corn' AND p.planting_population BETWEEN 28000 AND 40000 AND p.harvest_yield < 375)
            OR
            ('{{ crop_type }}' = 'soybeans' AND p.planting_population BETWEEN 100000 AND 200000 AND p.harvest_yield < 130)
          )
      table_name: temp_yp1k_base

  - step: 2
    id: diagnostic
    tool: analyze
    input_tables: [temp_yp1k_base]
    timeout_ms: 60000
    expected_parameters: [crop_type]
    output: agent
    arguments:
      table: temp_yp1k_base
      raw_mode: true
      code: |
        df = sql_df('SELECT * FROM "temp_yp1k_base"')
        df = df.reset_index(drop=True)
        df = compute_yp1k(df, crop_type='{{ crop_type }}')
        gap_result = detect_gap_pattern(df, '{{ crop_type }}')
        avg_gap = df['gap'].mean() if 'gap' in df.columns else 0
        gap_severity = classify_gap(avg_gap, '{{ crop_type }}')
        hybrid_summary = aggregate_weighted(df, ['hybrid'])
        results = []
        for _, row in hybrid_summary.iterrows():
            cl = classify_yp1k(row['avg_yp1k'], '{{ crop_type }}')
            results.append({
                'hybrid': row['hybrid'],
                'yp1k': round(row['avg_yp1k'], 2),
                'yield': round(row['avg_yield'], 1),
                'pop': round(row['avg_population']),
                'acres': round(row['total_acres']),
                'fields': int(row.get('zone_count', 0)),
                'status': cl['status'],
                'label': cl['label'],
                'adjustment': cl.get('adjustment', [0, 0]),
            })

        crop_label = 'Corn' if '{{ crop_type }}' == 'corn' else 'Soybean'
        valid_df = df.dropna(subset=['yp1k'])
        if len(valid_df) > 0 and valid_df['acres'].sum() > 0:
            overall_yp1k = round((valid_df['yp1k'] * valid_df['acres']).sum() / valid_df['acres'].sum(), 2)
        else:
            overall_yp1k = 0.0
        overall_cl = classify_yp1k(overall_yp1k, '{{ crop_type }}')
        emergence_critical = gap_severity['severity'] == 'critical'

        set_skill_metadata({
            'emergence_critical': emergence_critical,
            'gap_pattern': gap_result['pattern'],
            'gap_severity': gap_severity['severity'],
            'avg_gap': round(float(avg_gap), 1),
            'overall_yp1k': overall_yp1k,
            'overall_status': overall_cl['status'],
            'zone_count': int(len(df)),
            'field_count': int(df['field_name'].nunique()),
            'hybrid_count': int(df['hybrid'].nunique()),
        })

        print(f"=== YP1K Analysis: {crop_label} {{ year }} ===")
        print(f"Zones: {len(df):,} | Fields: {df['field_name'].nunique()} | Hybrids: {df['hybrid'].nunique()}")
        print(f"Overall YP1K: {overall_yp1k} — {overall_cl['label']}")
        print(f"Emergence: {gap_result['pattern']} — avg gap {avg_gap:,.0f} seeds/ac ({gap_severity['label']})")
        if gap_severity['severity'] == 'critical':
            print(f"CRITICAL: {gap_result['description']}")
        print()
        for r in sorted(results, key=lambda x: -x['acres']):
            adj = f"-> {r['adjustment'][0]:+,} to {r['adjustment'][1]:+,}" if r['adjustment'][0] != 0 else "-> No change"
            print(f"  {r['hybrid']:<25} YP1K: {r['yp1k']:>5.2f} | {r['label']:<22} | {r['acres']:>6,} ac | {adj}")

  - step: 3
    id: dashboard
    tool: render
    input_tables: [temp_yp1k_base]
    timeout_ms: 120000
    expected_parameters: [year, crop_type, company_id]
    output: panel
    arguments:
      template: yp1k-dashboard
      source_table: temp_yp1k_base
      crop_type: "{{ crop_type }}"
      year: "{{ year }}"
      company_id: "{{ company_id }}"
      title: "YP1K Analysis — {{ year }}"

hooks:
  - after: diagnostic
    condition: "{{ diagnostic.emergence_critical }} == true"
    execute: references/emergence
    parameters:
      year: "{{ year }}"
      crop_type: "{{ crop_type }}"
      company_id: "{{ company_id }}"
